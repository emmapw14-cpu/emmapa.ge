<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Collection — Emma Paige</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Didact+Gothic&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream: #f5f0e8;
      --warm-white: #faf7f2;
      --ink: #1a1714;
      --mid: #8a8278;
      --accent: #c8bfb0;
    }

    html, body {
      min-height: 100%;
      background-color: var(--cream);
      color: var(--ink);
      font-family: 'Didact Gothic', sans-serif;
      letter-spacing: 0.08em;
      color-scheme: light only;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 100;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 3rem;
      z-index: 50;
      mix-blend-mode: multiply;
      gap: 4rem;
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
      margin-left: auto;
    }

    .nav-links a {
      font-family: 'Didact Gothic', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      transition: opacity 0.3s ease;
    }

    .nav-links a:hover { opacity: 0.4; }
    .nav-links a.active { border-bottom: 1px solid var(--ink); padding-bottom: 2px; }

    /* PAGE */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 10rem 3rem 6rem;
    }

    /* COLLECTION HEADER */
    .collection-header {
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeIn 1s ease forwards 0.3s;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      margin-bottom: 2rem;
      transition: opacity 0.3s ease;
    }

    .back-link:hover { opacity: 0.5; }

    .collection-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1;
      margin-bottom: 1rem;
      color: var(--mid);
    }

    .collection-meta {
      display: flex;
      gap: 2.5rem;
      align-items: center;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .meta-label {
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .meta-value {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--ink);
    }

    .meta-divider {
      width: 1px;
      height: 2rem;
      background: var(--accent);
    }

    /* PHOTO GRID */
    .photo-grid {
      columns: 2;
      column-gap: 1rem;
      opacity: 0;
      animation: fadeIn 1s ease forwards 0.7s;
    }

    .photo-item {
      break-inside: avoid;
      margin-bottom: 1rem;
    }

    .photo-item img {
      width: 100%;
      display: block;
      filter: contrast(1.03) saturate(0.88);
    }

    /* placeholder */
    .photo-placeholder {
      width: 100%;
      background: linear-gradient(160deg, #d9d2c7, #c4bdb2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-placeholder span {
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--warm-white);
      opacity: 0.6;
      padding: 2rem 0;
    }

    /* tall placeholder */
    .photo-placeholder.tall { aspect-ratio: 2/3; }
    .photo-placeholder.wide { aspect-ratio: 3/2; }
    .photo-placeholder.square { aspect-ratio: 1/1; }

    /* FOOTER */
    .page-footer {
      margin-top: 5rem;
      padding-top: 2rem;
      border-top: 1px solid var(--accent);
      display: flex;
      justify-content: space-between;
      opacity: 0;
      animation: fadeIn 1s ease forwards 1.2s;
    }

    .footer-text {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      nav { padding: 1.2rem 1.5rem; gap: 1rem; }
      .nav-logo { font-size: 0.75rem; letter-spacing: 0.15em; }
      .nav-links { gap: 1rem; }
      .nav-links a { font-size: 0.55rem; letter-spacing: 0.12em; }

      .page { padding: 7rem 1.5rem 4rem; }
      .photo-grid { columns: 1; }
      .collection-meta { flex-wrap: wrap; gap: 1.5rem; }
      .meta-divider { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Emma Paige</a>
    <ul class="nav-links">
      <li><a href="archive.html" class="active">Archive</a></li>
      <li><a href="details.html">Details</a></li>
      <li><a href="style.html">Style</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main class="page">

    <div class="collection-header">
      <a href="archive.html" class="back-link">← Archive</a>

      <!--
        REPLACE: Update the shoot title below
      -->
      <h1 class="collection-title">Shoot Title Here</h1>

      <div class="collection-meta">
        <div class="meta-item">
          <span class="meta-label">Date</span>
          <!--
            REPLACE: Update the date below
          -->
          <span class="meta-value">April 2025</span>
        </div>
        <div class="meta-divider"></div>
        <div class="meta-item">
          <span class="meta-label">Photography</span>
          <!--
            REPLACE: Update the photo credit below
          -->
          <span class="meta-value">Emma Paige</span>
        </div>
        <div class="meta-divider"></div>
        <div class="meta-item">
          <span class="meta-label">Photos</span>
          <span class="meta-value">12</span>
        </div>
      </div>
    </div>

    <!--
      HOW TO ADD YOUR PHOTOS:
      Replace each photo-placeholder div with an img tag like this:
      <div class="photo-item">
        <img src="YOUR-PHOTO.jpg" alt="description" />
      </div>

      Mix tall and wide placeholders for visual rhythm.
    -->

    <div class="photo-grid">

      <div class="photo-item">
        <div class="photo-placeholder tall"><span>photo</span></div>
      </div>

      <div class="photo-item">
        <div class="photo-placeholder wide"><span>photo</span></div>
      </div>

      <div class="photo-item">
        <div class="photo-placeholder square"><span>photo</span></div>
      </div>

      <div class="photo-item">
        <div class="photo-placeholder tall"><span>photo</span></div>
      </div>

      <div class="photo-item">
        <div class="photo-placeholder wide"><span>photo</span></div>
      </div>

      <div class="photo-item">
        <div class="photo-placeholder square"><span>photo</span></div>
      </div>

    </div>

    <footer class="page-footer">
      <span class="footer-text">emmapaige.ca</span>
      <span class="footer-text">© 2025</span>
    </footer>

  </main>

</body>
</html>
