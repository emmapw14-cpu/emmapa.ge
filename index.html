<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emma Paige</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Didact+Gothic&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream: #f5f0e8;
      --warm-white: #faf7f2;
      --ink: #1a1714;
      --mid: #8a8278;
      --accent: #c8bfb0;
    }

    html, body {
      height: 100%;
      background-color: var(--cream);
      color: var(--ink);
      font-family: 'Didact Gothic', sans-serif;
      letter-spacing: 0.08em;
      cursor: default;
      color-scheme: light only;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 100;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 3rem;
      z-index: 50;
      mix-blend-mode: multiply;
      gap: 4rem;
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards 0.3s;
    }

    .nav-logo-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .nav-instagram {
      font-family: 'Didact Gothic', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: var(--mid);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      transition: opacity 0.3s ease;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards 0.4s;
    }

    .nav-instagram:hover { opacity: 0.4; }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards 0.5s;
      margin-left: auto;
    }

    .nav-links a {
      font-family: 'Didact Gothic', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      transition: opacity 0.3s ease;
    }

    .nav-links a:hover {
      opacity: 0.4;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      overflow: hidden;
    }

    .hero-left {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 3rem 4rem 3rem;
      position: relative;
    }

    .hero-image-wrap {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .hero-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: contrast(1.05) saturate(0.85);
      opacity: 0;
      animation: imageFade 1.8s ease forwards 0.6s;
    }

    /* placeholder when no image */
    .hero-image-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(160deg, #d9d2c7 0%, #c4bdb2 60%, #b8b0a5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: imageFade 1.8s ease forwards 0.6s;
    }

    .placeholder-text {
      font-family: 'Didact Gothic', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--warm-white);
      opacity: 0.7;
    }

    /* MAIN NAME */
    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: normal;
      font-size: clamp(3.5rem, 7vw, 6rem);
      line-height: 0.95;
      letter-spacing: -0.01em;
      color: var(--ink);
      opacity: 0;
      transform: translateY(20px);
      animation: riseIn 1.2s ease forwards 0.8s;
    }

    .hero-sub {
      margin-top: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      opacity: 0;
      animation: fadeIn 1s ease forwards 1.2s;
    }

    .model-card-link {
      margin-top: 1.5rem;
    }

    .hero-location {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .hero-instagram {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: lowercase;
      color: var(--ink);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: opacity 0.3s ease;
    }

    .hero-instagram svg {
      width: 13px;
      height: 13px;
      fill: var(--ink);
      flex-shrink: 0;
    }

    .hero-instagram:hover {
      opacity: 0.45;
    }

    /* BOTTOM STRIP */
    .hero-bottom {
      position: absolute;
      bottom: 3rem;
      left: 3rem;
      right: 3rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      animation: fadeIn 1s ease forwards 1.5s;
    }

    .model-card-link {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
      transition: opacity 0.3s ease;
    }

    .model-card-link:hover {
      opacity: 0.4;
    }

    .year-mark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.7rem;
      font-style: normal;
      color: var(--mid);
      letter-spacing: 0.1em;
    }

    /* vertical text */
    .vertical-text {
      position: absolute;
      right: -1.5rem;
      top: 50%;
      transform: translateY(-50%) rotate(90deg);
      font-size: 0.55rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
      opacity: 0;
      animation: fadeIn 1s ease forwards 1.8s;
    }

    /* ANIMATIONS */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes imageFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      nav {
        padding: 1.2rem 1.5rem;
        gap: 1rem;
      }

      .nav-logo {
        font-size: 0.75rem;
        letter-spacing: 0.15em;
      }

      .nav-links {
        gap: 1rem;
      }

      .nav-links a {
        font-size: 0.55rem;
        letter-spacing: 0.12em;
      }

      .hero {
        grid-template-columns: 1fr;
        grid-template-rows: 60vh 1fr;
      }

      .hero-image-wrap {
        height: 60vh;
        order: -1;
      }

      .hero-left {
        padding: 2rem 1.5rem 10rem;
        justify-content: flex-start;
      }

      .hero-bottom {
        bottom: 2.5rem;
        left: 1.5rem;
        right: 1.5rem;
      }

      .vertical-text {
        display: none;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo-wrap">
      <a href="index.html" class="nav-logo">Emma Paige</a>
      <a href="https://instagram.com/emmapa.ge" target="_blank" class="nav-instagram">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="11" height="11" style="fill:var(--mid);flex-shrink:0;"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
        @emmapa.ge
      </a>
    </div>
    <ul class="nav-links">
      <li><a href="archive.html">Archive</a></li>
      <li><a href="details.html">Details</a></li>
      <li><a href="style.html">Style</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main class="hero">

    <section class="hero-left">
      <h1 class="hero-name">Emma<br>Paige</h1>
      <div class="hero-sub">
        <span class="hero-location">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="9" height="9" style="fill:var(--mid);margin-right:5px;vertical-align:middle;"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>Ontario
        </span>
      </div>
      <span class="vertical-text">Modelling · Styling · Creative Direction</span>
    </section>

    <div class="hero-image-wrap">
      <!--
        REPLACE THIS SECTION WITH YOUR PHOTO:

    </div>

  </main>

  <div class="hero-bottom">
    <a href="details.html" class="model-card-link">Details</a>

  </div>

</body>
</html>
